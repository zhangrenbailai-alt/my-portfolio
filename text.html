<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — SITE TITLE</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .error-num {
      font-size: 8rem;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
    }

    .error-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: #444;
      margin-bottom: 0.8rem;
    }

    .error-text {
      color: #555;
      font-size: 0.88rem;
      line-height: 1.9;
      margin-bottom: 2.5rem;
    }

    .error-link {
      font-size: 0.78rem;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.06em;
      border-bottom: 0.5px solid #333;
      padding-bottom: 0.2rem;
      transition: color 0.2s, border-color 0.2s;
    }

    .error-link:hover {
      color: #fff;
      border-color: #888;
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://zhangrenbailai-alt.github.io/my-portfolio" class="nav-logo">SITE TITLE</a>
    <div class="nav-links">
      <a href="index.html">works</a>
      <a href="about.html">about</a>
      <a href="blog.html">blog</a>
    </div>
  </nav>

  <div class="error-body">
    <div class="error-num">404</div>
    <div class="error-label">page not found</div>
    <p class="error-text">
      此頁久遠不存<br>尋之者空手而返
    </p>
    <a href="https://zhangrenbailai-alt.github.io/my-portfolio" class="error-link">トップページへ戻る</a>
  </div>

</body>
</html>
