  <div class="post-body">

    <p>
        QRコードには最大３０％の誤り訂正機能があるため、崩し気味でも認識できる。
    </p>

    <!-- 画像を入れる場合 -->
    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877720/IMG_9458_u2poab.jpg" alt="漢字風QRコード書道" class="post-img">

    <p>元のQRコード</p>

    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877722/IMG_9459_i9yevb.jpg" alt="元のQRコード" class="post-img">

    <p>
        このサイトのURLは文字数が多いので直接QRコードに埋め込むと密度とマス目数が増えすぎてしまい書道のような筆触が出なかった。<br>
        そのため、短縮URLを作ってそれをQRコードにすることで書道のようにある程度自由に筆を動かせるようにした。
    </p>

    <p>画像生成AIで作成したQRコード（元のURL）</p>

    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877721/QRcode_text1%E5%A4%B1%E6%95%97%E4%BD%9C_mrwvwg.jpg" alt="失敗作QRコード" class="post-img">

    <p>短縮URLを使ったもの</p>

    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877721/QRcode_text1%E5%A4%9A%E5%88%86%E6%88%90%E5%8A%9F_my7exl.jpg" alt="成功QRコード" class="post-img">

  </div>
