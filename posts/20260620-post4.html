    <h2>共同編集とその痕跡の作品化</h2>

    <p>
        展示空間にテレビを設置し、QRコードと文章を表示する。<br>
        鑑賞者はQRコードをスキャンすると、テレビに表示された文章をリアルタイムで編集することができる。<br>
        テレビには常に現在の状態が表示される。<br>
        手元のスマホには、自分以外のランダムな鑑賞者の一人がどのように文章を編集したかの履歴がずらっと表示される。<br>
        その人物がいつ何を消して、何を書き足したか、編集の一連の過程が時系列で並ぶ。<br>
        誰が編集したかはテレビにも手元にも表示されない。<br>
    </p>
