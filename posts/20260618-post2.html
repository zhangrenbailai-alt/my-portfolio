    <h1>北斎まんが風QRコードの制作</h1><!-- ← 変える -->
    <time class="post-date">2026.06.18</time><!-- ← 日付を変える -->
  </div>

  <div class="post-body">

    <p>
        蛸をモチーフにQRコードを作成した。<br>
        途中の段階では読み込めたが、完成したあとに試したところ全く読み取ることができなかった。
    </p>

    <!-- 画像を入れる場合 -->
    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877722/IMG_9473_jhbhab.jpg" alt="北斎まんが風QRコードver.1" class="post-img">

    <p>
        原因を考える。<br>
        QRコードリーダーは大きい三つの正方形を認識するとQRコードと判断する。<br>
        この時大きい三つの正方形の周りに十分な白い余白がないと正方形と認識されない。<br>
        そこで半紙をちぎり周辺に貼ってみることにした。
    </p>

    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877722/IMG_9475_iftyrb.jpg" alt="北斎まんが風QRコードver.2" class="post-img">

    <p>
        これで認識してくれた。<br>
        これに海の波をイメージした墨汁の滲みをつくり一旦完成とする。
    </p>

    <img src="https://res.cloudinary.com/dxgmaxmta/image/upload/q_auto/f_auto/v1781877721/IMG_9477_yluvjb.jpg" alt="北斎まんが風QRコードver.3" class="post-img">    

  </div>
